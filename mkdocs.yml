# `docs/resources/project-history/` holds legacy PHASE notes, the AUDIT, the
# Aether spec, and the brush palette plan. They stay in the repo (URLs survive
# for anyone who linked to them) but they are intentionally not in the nav: the
# files reference relative paths into the source tree that don't resolve from
# the published site, and the content is internal history rather than user-
# facing documentation.

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            show_source: false
            show_signature_annotations: true
            show_bases: true
            docstring_style: google
            members_order: source
            heading_level: 3

