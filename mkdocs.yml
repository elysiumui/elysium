site_name: Elysium UI
site_description: Python desktop UI framework for borderless, shaped, GPU-accelerated, animated apps.
site_url: https://docs.elysiumui.com/
repo_url: https://github.com/elysiumui/elysium
edit_uri: edit/main/docs/

# Legacy PHASE notes, AUDIT, Aether spec, and brush palette plan have been
# moved to `.docs-staging/project-history/` (outside the docs tree) so the
# public site stays focused. They remain in the repo for archival reference.
validation:
  omitted_files: ignore
  absolute_links: warn
  unrecognized_links: ignore
  anchors: warn

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.expand
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

