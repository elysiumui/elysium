site_name: Elysium Designer
site_description: The cross-platform desktop app for authoring borderless animated Python skins.
site_url: https://designer.elysiumui.com/
repo_url: https://github.com/elysiumui/elysium
edit_uri: edit/main/docs-designer/
docs_dir: docs-designer

# `icon-redesign/README.md` would render to the same `index.html` as the
# hand-authored gallery page in that folder, and `*.partial.md` files are
# snippet includes (pulled in via pymdownx.snippets), not standalone pages.
# Keep both out of the built site so `mkdocs build --strict` stays green.
exclude_docs: |
  icon-redesign/README.md
  *.partial.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.expand
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github

